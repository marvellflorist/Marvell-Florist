<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marvell Florist | Batam</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      color: white;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      height: 48px;
    }

    .menu a {
      margin-left: 28px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.4px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }

    .hero {
      height: 100vh;
      background: url("assets/background.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      padding: 90px 100px;
      text-align: center;
      max-width: 720px;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 68px;
      font-weight: 500;
      margin-bottom: 20px;
      text-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }

    p {
      font-size: 18px;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 36px;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    .button {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #2e2a27;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .overlay {
        padding: 60px 32px;
      }

      h1 {
        font-size: 44px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <img src="assets/logo.png.jpeg" alt="Marvell Florist Logo" class="logo">
    <nav class="menu">
      <a href="index.html">Beranda</a>
      <a href="shop.html">Toko</a>
      <a href="about.html">Tentang</a>
      <a href="contact.html">Kontak</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="overlay">
    <h1>Marvell Florist</h1>
    <p>
      Where every petal is a little more marvelous
    </p>
    <a href="shop.html" class="button">Belanja Sekarang</a>
  </div>
</section>

</body>
</html>
