<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marvell Florist | Batam</title>

  <!-- Fonts: restrained, editorial -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      color: #ffffff;
      background-color: #000;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo {
      height: 38px;
      opacity: 0.85;
    }

    nav a {
      margin-left: 32px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.3px;
      color: rgba(255,255,255,0.9);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      background-image: url("assets/background.png.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      padding: 140px 10vw 80px;
    }

    .hero-text {
      max-width: 620px;
    }

    h1 {
      font-family: "DM Serif Display", serif;
      font-size: 72px;
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 20px;

      /* very subtle shadow – just enough */
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      margin-bottom: 38px;

      /* even subtler */
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .button {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #1f1f1f;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header {
        padding: 20px 24px;
      }

      h1 {
        font-size: 44px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="assets/logo.png" alt="Marvell Florist" class="logo">
  <nav>
    <a href="index.html">Beranda</a>
    <a href="shop.html">Toko</a>
    <a href="about.html">Tentang</a>
    <a href="contact.html">Kontak</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Marvell Florist</h1>
    <p>Where every petal is a little more marvelous.</p>
    <a href="shop.html" class="button">Belanja Sekarang</a>
  </div>
</section>

</body>
</html>
